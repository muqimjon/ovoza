<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <title>Ovoza — Biznes jarayonlarini avtomatlashtirish</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06b6d4">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@500&display=swap">
  <script>
    (function () {
      var el = document.documentElement;
      el.classList.add('js');
      try {
        var stored = localStorage.getItem('ovoza-theme');
        var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) el.classList.add('dark');
        el.style.colorScheme = dark ? 'dark' : 'light';
        el.style.backgroundColor = dark ? '#080a0f' : '#f7f9fc';
      } catch (e) {}
    })();
  </script>
  <noscript>
    <style>.reveal { opacity: 1 !important; transform: none !important; }</style>
  </noscript>
</head>
<body>
  <app-root></app-root>
</body>
</html>
